# CADRender SaaS — Production Docker Compose
#
# Services:
#   postgres      — Primary database (asyncpg)
#   redis         — Message queue backend
#   minio         — S3-compatible object storage (models, renders)
#   blenderserver — FastAPI application server
#
# Usage:
#   docker compose up -d
#   docker compose ps
#   docker compose logs -f blenderserver
#
# Environment overrides (create a .env file):
#   ANTHROPIC_API_KEY=sk-ant-...   # Required for LLM prompt→intent conversion
#   JWT_SECRET=change-me           # Override default dev secret
#   WORKER_CALLBACK_SECRET=change-me

services:

  # ── Database ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cadrender
      POSTGRES_PASSWORD: cadrender
      POSTGRES_DB: cadrender
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cadrender"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    restart: unless-stopped
    profiles:
      - ""     # default — always included

  # ── Message queue ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"
    restart: unless-stopped
    profiles:
      - ""

  # ── Object storage (S3-compatible) ────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    profiles:
      - ""

  # ── Application server ────────────────────────────────────────────────
  blenderserver:
    build:
      context: .
    ports:
      - "8060:8060"
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://cadrender:cadrender@postgres:5432/cadrender

      # Queue
      QUEUE_BACKEND: redis
      REDIS_URL: redis://redis:6379/0

      # Object storage
      STORAGE_BACKEND: s3
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: cadrender

      # Auth (override in production!)
      JWT_SECRET: ${JWT_SECRET:-change-in-production}
      WORKER_CALLBACK_SECRET: ${WORKER_CALLBACK_SECRET:-change-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}

      # LLM (optional — only needed for text→intent conversion)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}

      # Storage directories (inside container)
      OUTPUT_DIR: /app/outputs
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
      - outputs_data:/app/outputs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8060/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped
    profiles:
      - ""

volumes:
  postgres_data:
  redis_data:
  minio_data:
  uploads_data:
  outputs_data:
